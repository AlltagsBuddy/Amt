<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amt-O-Mat | AlltagsBuddy</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f9f9f9;
      color: #333;
    }
    header {
      background-color: #ffffff;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #eee;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo img {
      height: 60px;
    }
    .logo span {
      font-size: 1.8rem;
      font-weight: 700;
      color: #1BC7C2;
    }
    .cta-button {
      background-color: #FF6B00;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
    }
    main {
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    label {
      display: block;
      margin-top: 15px;
      font-weight: 600;
    }
    input[type="text"],
    textarea,
    select {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 1rem;
      box-sizing: border-box;
    }
    .hidden {
      display: none;
    }
    button {
      width: 100%;
      background-color: #FF6B00;
      color: white;
      font-weight: bold;
      border: none;
      cursor: pointer;
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      font-size: 1rem;
    }
    .output {
      margin-top: 30px;
      background-color: #f4f4f4;
      padding: 20px;
      border-radius: 8px;
      white-space: pre-wrap;
    }
    footer {
      text-align: center;
      padding: 30px;
      background-color: #1BC7C2;
      color: white;
    }
    #status {
      margin-top: 15px;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>
<body>
<header>
  <div class="logo">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="AlltagsBuddy Logo" />
    <span>AlltagsBuddy</span>
  </div>
  <a href="index.html" class="cta-button">Zurück zur Startseite</a>
</header>

<main>
  <h1>Amt-O-Mat – Der KI-Formulargenerator</h1>
  <p style="text-align:center">
    Erstelle automatisch offizielle Schreiben für dein Anliegen bei Ämtern & Behörden. Wähle einfach Behörde, Anlass, Tonfall und gib deine Daten ein.
  </p>

  <form id="formGenerator">
    <label for="name">Dein Name</label>
    <input type="text" id="name" placeholder="Max Mustermann" required />

    <label for="adresse">Deine Adresse</label>
    <textarea id="adresse" rows="2" placeholder="Musterstraße 1, 12345 Musterstadt" required></textarea>

    <label for="kundennummer">Kundennummer (optional)</label>
    <input type="text" id="kundennummer" />

    <label for="behoerde">Behörde</label>
    <select id="behoerde">
      <option value="Jobcenter">Jobcenter</option>
      <option value="Bürgeramt">Bürgeramt</option>
      <option value="Agentur für Arbeit">Agentur für Arbeit</option>
      <option value="Familienkasse">Familienkasse</option>
      <option value="Stadtverwaltung">Stadtverwaltung</option>
      <option value="Sonstiges">Sonstiges</option>
    </select>
    <input type="text" id="behoerde_custom" class="hidden" placeholder="Gib deine Behörde ein..." />

    <label for="anliegen">Anliegen</label>
    <select id="anliegen">
      <option value="Widerspruch">Widerspruch</option>
      <option value="Antrag stellen">Antrag stellen</option>
      <option value="Nachweise senden">Nachweise senden</option>
      <option value="Kündigung">Kündigung</option>
      <option value="Rückmeldung / Nachfrage">Rückmeldung / Nachfrage</option>
      <option value="Sonstiges">Sonstiges</option>
    </select>
    <input type="text" id="anliegen_custom" class="hidden" placeholder="Gib dein Anliegen ein..." />

    <label for="tonfall">Tonfall</label>
    <select id="tonfall">
      <option value="neutral">Neutral</option>
      <option value="freundlich">Freundlich-bestimmt</option>
      <option value="formell">Förmlich</option>
    </select>

    <label for="details">Zusätzliche Angaben</label>
    <textarea id="details" rows="5" placeholder="z. B. genaue Situation, gewünschter Ablauf, Fristen"></textarea>

    <button id="generateBtn" type="submit">📄 Amtsschreiben generieren</button>
  </form>

  <div id="status"></div>
  <div id="output" class="output"></div>
  <div id="export-buttons" style="display:none">
    <button id="downloadPdfBtn">📥 PDF herunterladen</button>
    <button id="downloadDocxBtn">📝 Word herunterladen</button>
  </div>
</main>

<footer>
  &copy; 2025 AlltagsBuddy – Dein smarter KI-Buddy für Behördenkram
</footer>

<script>
  const form = document.getElementById('formGenerator');
  const status = document.getElementById('status');
  const output = document.getElementById('output');
  const exportBox = document.getElementById('export-buttons');
  const generateBtn = document.getElementById('generateBtn');
  const downloadPdfBtn = document.getElementById('downloadPdfBtn');
  const downloadDocxBtn = document.getElementById('downloadDocxBtn');

  const behoerde = document.getElementById('behoerde');
  const behoerde_custom = document.getElementById('behoerde_custom');
  const anliegen = document.getElementById('anliegen');
  const anliegen_custom = document.getElementById('anliegen_custom');

  behoerde.addEventListener('change', () => {
    behoerde_custom.classList.toggle('hidden', behoerde.value !== 'Sonstiges');
  });

  anliegen.addEventListener('change', () => {
    anliegen_custom.classList.toggle('hidden', anliegen.value !== 'Sonstiges');
  });

  function setStatus(msg, color = '#333') {
    status.innerText = msg;
    status.style.color = color;
  }

  function disableAll(disabled) {
    generateBtn.disabled = disabled;
    downloadPdfBtn.disabled = disabled;
    downloadDocxBtn.disabled = disabled;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const inputData = {
      name: document.getElementById('name').value.trim(),
      adresse: document.getElementById('adresse').value.trim(),
      kundennummer: document.getElementById('kundennummer').value.trim(),
      behoerde: behoerde.value === 'Sonstiges' ? behoerde_custom.value.trim() : behoerde.value,
      anliegen: anliegen.value === 'Sonstiges' ? anliegen_custom.value.trim() : anliegen.value,
      tonfall: document.getElementById('tonfall').value,
      details: document.getElementById('details').value.trim()
    };

    if (!inputData.name || !inputData.adresse) {
      setStatus('⚠️ Bitte fülle Name und Adresse aus.', 'red');
      return;
    }

    setStatus('⏳ Schreiben wird generiert...');
    disableAll(true);

    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(inputData)
    });

    const data = await res.json();
    if (data.error) {
      setStatus('❌ Fehler: ' + data.error, 'red');
      disableAll(false);
      return;
    }

    result = data;
    output.innerHTML = `<h3>Generiertes Schreiben:</h3><p>${data.brieftext.replace(/\n/g, '<br>')}</p>`;
    setStatus('✅ Schreiben erfolgreich erstellt!', 'green');
    exportBox.style.display = 'block';
    disableAll(false);
  });

  downloadPdfBtn.addEventListener('click', async () => {
    setStatus('📄 PDF wird erstellt...');
    disableAll(true);
    const res = await fetch('/api/export/pdf', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(result)
    });
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'amtsschreiben.pdf';
    a.click();
    setStatus('✅ PDF wurde heruntergeladen', 'green');
    disableAll(false);
  });

  downloadDocxBtn.addEventListener('click', async () => {
    setStatus('📝 Word wird erstellt...');
    disableAll(true);
    const res = await fetch('/api/export/docx', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(result)
    });
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'amtsschreiben.docx';
    a.click();
    setStatus('✅ Word-Datei wurde heruntergeladen', 'green');
    disableAll(false);
  });
</script>
</body>
</html>
