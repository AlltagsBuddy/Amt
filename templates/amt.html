<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amt-O-Mat | AlltagsBuddy</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f9f9f9;
      color: #333;
    }
    header {
      background-color: #ffffff;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #eee;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo img {
      height: 60px;
    }
    .logo span {
      font-size: 1.8rem;
      font-weight: 700;
      color: #1BC7C2;
    }
    .cta-button {
      background-color: #FF6B00;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
    }
    main {
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
      color: #FF6B00;
    }
    label {
      display: block;
      margin-top: 15px;
      font-weight: 600;
    }
    input[type="text"],
    textarea,
    select {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 1rem;
      box-sizing: border-box;
    }
    .speech-btn {
      padding: 6px 10px;
      margin-left: 10px;
      background-color: #1BC7C2;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      width: 40px;
    }
    .speech-wrapper {
      display: flex;
      align-items: center;
    }
    button {
      width: 100%;
      background-color: #FF6B00;
      color: white;
      font-weight: bold;
      border: none;
      cursor: pointer;
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      font-size: 1rem;
    }
    .output {
      margin-top: 30px;
      background-color: #f4f4f4;
      padding: 20px;
      border-radius: 8px;
      white-space: pre-wrap;
    }
    footer {
      text-align: center;
      padding: 30px;
      background-color: #1BC7C2;
      color: white;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <img src="{{ url_for('static', filename='logo.png') }}" alt="AlltagsBuddy Logo" />
      <span>AlltagsBuddy</span>
    </div>
    <a href="index.html" class="cta-button">Zurück zur Startseite</a>
  </header>

  <main>
    <h1>Amt-O-Mat – Der KI-Formulargenerator</h1>

    <form id="formGenerator">
      <label for="name">Dein Name</label>
      <input type="text" id="name" placeholder="Max Mustermann" />

      <label for="adresse">Deine Adresse</label>
      <textarea id="adresse" rows="2" placeholder="Musterstraße 1, 12345 Musterstadt"></textarea>

      <label for="kundennummer">Kundennummer (optional)</label>
      <input type="text" id="kundennummer" />

      <label for="behoerde">Behörde</label>
      <select id="behoerde">
        <option>Jobcenter</option>
        <option>Bürgeramt</option>
        <option>Agentur für Arbeit</option>
        <option>Familienkasse</option>
        <option>Stadtverwaltung</option>
        <option>Sonstiges</option>
      </select>
      <div id="behoerdeSonstigesWrapper" style="display:none;">
        <label for="behoerdeSonstiges">Manuelle Behördenangabe</label>
        <div class="speech-wrapper">
          <input type="text" id="behoerdeSonstiges" />
          <button type="button" class="speech-btn" onclick="startSpeech('behoerdeSonstiges')">🎤</button>
        </div>
      </div>

      <label for="anliegen">Anliegen</label>
      <select id="anliegen">
        <option>Widerspruch</option>
        <option>Antrag stellen</option>
        <option>Nachweise senden</option>
        <option>Kündigung</option>
        <option>Rückmeldung / Nachfrage</option>
        <option>Sonstiges</option>
      </select>
      <div id="anliegenSonstigesWrapper" style="display:none;">
        <label for="anliegenSonstiges">Manuelle Anliegenangabe</label>
        <div class="speech-wrapper">
          <input type="text" id="anliegenSonstiges" />
          <button type="button" class="speech-btn" onclick="startSpeech('anliegenSonstiges')">🎤</button>
        </div>
      </div>

      <!-- Weitere Felder wie Tonfall, Details, Button -->
    </form>

    <div id="status"></div>
    <div id="output" class="output"></div>
  </main>

  <footer>
    &copy; 2025 AlltagsBuddy – Dein smarter KI-Buddy für Behördenkram
  </footer>

  <script>
    function startSpeech(id) {
      const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
      recognition.lang = 'de-DE';
      recognition.onresult = function(event) {
        document.getElementById(id).value = event.results[0][0].transcript;
      };
      recognition.start();
    }

    document.getElementById('behoerde').addEventListener('change', function() {
      document.getElementById('behoerdeSonstigesWrapper').style.display = this.value === 'Sonstiges' ? 'block' : 'none';
    });
    document.getElementById('anliegen').addEventListener('change', function() {
      document.getElementById('anliegenSonstigesWrapper').style.display = this.value === 'Sonstiges' ? 'block' : 'none';
    });
  </script>
</body>
</html>
